name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Run prod-deploy
        shell: bash
        run: |
          cd /root/apps/deplixo-mcp
          sudo git pull origin main
          sudo just prod-deploy

      - name: Compose status
        if: always()
        shell: bash
        run: |
          sudo docker compose -p deplixomcp ps
